# Frostfuscator configuration

input: "input.jar"
output: "output.jar"

# Used by renaming passes.
dictionary: "alphabet"

# Dependency JAR folder used for hierarchy checks.
libs: ""

# Package handling during class renaming: keep, flatten, remove.
package-mode: "keep"
flatten-package: "obf"

# Regex filters for class names.
inclusions: []
exclusions: []

transformers:

  # Ownership / watermarking
  watermark:
    enabled: true
    owner: "unknown"
    id: "change-me"
    class-annotations: true
    string-field: true
    field-name: "__frost$watermark"

  # Integrity metadata
  integrity:
    enabled: true

  # Runtime protection
  anti-debug:
    enabled: false
    method-name: "__frost$antiDebug"
    check-arguments: true
    check-debug-classes: true
    check-stack: true
    check-timing: true
    shared-helper: true
    helper-class: ""
    timing-iterations: 1000000
    timing-threshold-ms: 80
    check-processes: false

  anti-decompiler:
    enabled: true

  junk-code:
    enabled: true
    min-methods-per-class: 1
    max-methods-per-class: 2
    min-fields-per-class: 0
    max-fields-per-class: 1
    seed: 0

  fake-classes:
    enabled: false
    priority: "pre-obfuscation"
    count: 12
    min-methods-per-class: 8
    max-methods-per-class: 16
    min-fields-per-class: 2
    max-fields-per-class: 4
    kind-ratio: "regular:70,interface:10,enum:10,inner:10"
    placement: "package-mode"
    naming: "dictionary"
    custom-pattern: "Fake{index}"
    package: "frost/junk"
    seed: 0

  # Funsies
  inject-banner:
    enabled: false
    text: "Protected by Frostfuscator"
    copies: 1

  emoji-hell:
    enabled: false
    copies: 3

  copypasta-injector:
    enabled: false
    copies: 3

  fake-application:
    enabled: false
    profiles: "minecraft-plugin,networking-stack,enterprise"
    classes-per-profile: 3
    min-methods-per-class: 8
    max-methods-per-class: 24
    min-fields-per-class: 3
    max-fields-per-class: 10
    seed: 0

  chinese-mode:
    enabled: false
    package-mode: "random"
    package-prefix: "冰霜/混淆器"
    rename-members: true
    inject-fun: true
    large-banners: true
    quotes: true
    inject-metadata: true
    inject-strings: true
    min-fun-members: 1
    max-fun-members: 3

  # Resource handling
  resource-compression:
    enabled: false
    remove-originals: true
    output-prefix: "META-INF/frostfuscator/resources/"

  resource-encryption:
    enabled: false
    remove-originals: false
    output-prefix: "META-INF/frostfuscator/encrypted/"
    seed: 0

  # Optimization
  bytecode-optimizer:
    enabled: true

  jar-shrinker:
    enabled: false

  # Reporting
  statistics-report:
    enabled: true
    format: "json"
    output: "frost-report.json"

  # Existing obfuscation passes
  class-rename:
    enabled: true
    mode: "aggressive"
    exclusions: []
    inclusions: []

  field-rename:
    enabled: true
    mode: "aggressive"
    exclusions:
      - "serialVersionUID"
    inclusions: []

  method-rename:
    enabled: true
    mode: "aggressive"
    exclusions:
      - "main"
    inclusions: []

  local-variable-rename:
    enabled: true
    exclusions: []
    inclusions: []

  remove-debug:
    enabled: true
    remove-source-file: true
    remove-line-numbers: true
    remove-local-variables: true
    remove-parameters: true
    exclusions: []
    inclusions: []

  string-encryption:
    enabled: true
    mode: "heavy"
    min-length: 1
    exclusions: []
    inclusions: []

  number-obfuscation:
    enabled: true
    probability: 80
    max-per-method: 96
    max-per-class: 256
    exclusions: []
    inclusions: []

  parameter-encryption:
    enabled: true
    probability: 30
    exclusions: []
    inclusions: []

  flow-obfuscation:
    enabled: true
    mode: "heavy"
    exception-guards: true
    stack-noise: true
    flatten: true
    predicate-rate: 8
    max-predicates-per-method: 24
    min-method-instructions: 12
    exclusions: []
    inclusions: []

  stack-manipulation:
    enabled: true
    probability: 8
    max-per-method: 16
    exclusions: []
    inclusions: []

  invoke-dynamic:
    enabled: true
    probability: 35
    mutable-callsites: true
    exclusions: []
    inclusions: []

  reference-hiding:
    enabled: true
    probability: 45
    max-per-class: 96
    exclusions: []
    inclusions: []

  access-modifier:
    enabled: true
    synthetic: true
    bridge-methods: false
    relax-final: false
    exclusions: []
    inclusions: []

  metadata-noise:
    enabled: true
    strings-per-class: 8
    deprecated: true
    signatures: true
    exclusions: []
    inclusions: []

  flow-outliner:
    enabled: true
    probability: 25
    max-per-class: 16
    exclusions: []
    inclusions: []

  flow-range:
    enabled: true
    probability: 35
    exclusions: []
    inclusions: []

  flow-condition:
    enabled: true
    probability: 25
    max-per-method: 16
    exclusions: []
    inclusions: []

  flow-exception:
    enabled: true
    strength: "AGGRESSIVE"
    exclusions: []
    inclusions: []

  exception-return:
    enabled: false
    exclusions: []
    inclusions: []

  flow-switch:
    enabled: true
    probability: 75
    exclusions: []
    inclusions: []

mapping:
  enabled: true
  output: "mapping.txt"
